name: Release Extension

on:
  push:
    tags:
      - 'v*'  # Trigger release when a tag starting with v is pushed (e.g. v1.0.1)
  workflow_dispatch:  # Manual triggering

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Build extension
        run: ./gradlew bwextension

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build MCPB bundle
        run: |
          cd mcpb/server
          npm install
          cd ../..
          npx -y @anthropic-ai/mcpb pack mcpb WigAI.mcpb

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/extensions/WigAI.bwextension
            WigAI.mcpb
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
